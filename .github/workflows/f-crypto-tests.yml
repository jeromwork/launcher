# Spec 016 (F-CRYPTO) CI gate per T6E0-T6E2.
#
# Three jobs:
#   1. crypto-isolation — fitness function: :core:crypto MUST NOT depend on launcher modules.
#   2. crypto-jvm-tests — RFC KAT vectors + property tests + KeyBlob roundtrip + backward-compat.
#   3. crypto-no-fakes-in-app — Konsist scan: production app/src/main MUST NOT import family.crypto.fake.*.
#
# Android instrumentation tests (:core:crypto:connectedDebugAndroidTest) require an
# emulator runner and are documented separately — currently run manually until the
# emulator-runner setup from integration-tests.yml is enabled project-wide.

name: f-crypto-tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  crypto-isolation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Verify :core:crypto isolation (FR-005, SC-006)
        run: ./gradlew :core:crypto:verifyCryptoIsolation

  crypto-jvm-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Run :core:crypto:jvmTest (RFC KAT + property tests + wireformat)
        run: ./gradlew :core:crypto:jvmTest

  crypto-no-fakes-in-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      - name: Konsist fitness — no family.crypto.fake imports in app/src/main (FR-018, SC-011)
        run: ./gradlew :app:testMockBackendDebugUnitTest --tests "com.launcher.app.fitness.*"
