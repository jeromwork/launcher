# workers/push — generic push-trigger Worker (Spec 019 F-5c).
#
# Replaces /notify endpoint of legacy push-worker/ during Phase 4 migration.
# Per plan.md §Architecture (Module map).
#
# TODO(C10 exit ramp / TODO-ARCH-001): при миграции на свой домен — раскомментировать
#   [[routes]] block ниже + удалить *.workers.dev из HttpPushTrigger
#   WORKER_BASE_URL constant. См. server-roadmap.md SRV-PUSH-FOUNDATION.

name = "launcher-push-v2"
main = "src/index.ts"
compatibility_date = "2025-05-11"

# TODO(setup T004): заполнить account_id перед первым `wrangler deploy`.
# account_id = "<copy from existing push-worker/wrangler.toml after Phase 4 migration>"

[vars]
# Public (не secret) — Firebase project ID для FCM HTTP v1 send API.
# Same project as legacy push-worker/.
FIREBASE_PROJECT_ID = "launcher-old-dev"

# Maximum supported wire-format schema version (mirrors Kotlin const
# WireFormatVersion.MAX_SUPPORTED_SCHEMA_VERSION). T402 fitness function
# verifies these stay in sync.
MAX_SUPPORTED_SCHEMA_VERSION = "1"

# KV namespaces — созданы 2026-06-22 через `wrangler kv namespace create`.
# preview_id опущен — мы не используем `wrangler dev` локально для этого Worker'а,
# тесты гоняем напрямую через `wrangler deploy`.

[[kv_namespaces]]
binding = "JWKS_CACHE"
id = "8e23d27757bc49a190471c0091cecc1b"

[[kv_namespaces]]
binding = "IDEMPOTENCY_CACHE"
id = "3d4f071d5ae64f15a110e1238a433244"

[[kv_namespaces]]
binding = "RATE_LIMIT"
id = "39e310a33eb24e7f9a30b40c2e319769"

# TODO(setup T005): secrets через `wrangler secret put`:
#   FCM_SERVER_KEY      — service-account JWT signing key (for FCM HTTP v1)
#   FIREBASE_SA_JSON    — full service-account JSON (alternative; choose one)
# Для local dev — workers/push/.dev.vars (gitignored).

# TODO(TODO-ARCH-001 custom domain): раскомментировать routes block
# когда переедем с *.workers.dev на собственный домен.
# [[routes]]
# pattern = "push.<our-domain>/push"
# custom_domain = true
