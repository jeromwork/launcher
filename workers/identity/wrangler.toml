# workers/identity — Identity-init Worker (Spec task-6 F-5 Phase 4 Track B).
#
# Single endpoint: POST /init-claim
#   Body: { uid: string }
#   Auth: Firebase ID-token Bearer; claims.uid MUST match body.uid.
#   Behaviour: idempotent — generates UUID v4 stableId on first call,
#     persists in Firestore `/identity-links/{uid}`, sets Firebase custom
#     claim via Identity Toolkit REST API. Subsequent calls return the
#     existing stableId without re-setting the claim.
#
# Two-Worker boundary (DZ-5): MUST NOT share state with workers/backup/.
# Each Worker owns its own R2/KV bindings; cross-Worker calls go through
# the public HTTP surface, not through shared module state.

name = "launcher-identity-v1"
main = "src/index.ts"
compatibility_date = "2025-05-11"

# TODO(setup): account_id by owner before first deploy.
# account_id = "<copy from workers/push/ after Phase 4>"

[vars]
# Same Firebase project as backup + push workers.
FIREBASE_PROJECT_ID = "launcher-old-dev"

# TODO(setup secrets): owner runs `wrangler secret put` for:
#   FIREBASE_SA_JSON — service-account JSON for Identity Toolkit + Firestore
#                       admin access. See docs/dev/secrets-cloudflare-worker.md.

# JWKS cache — shared with backup + push workers when bound.
# [[kv_namespaces]]
# binding = "JWKS_CACHE"
# id = "8e23d27757bc49a190471c0091cecc1b"

# Routes — *.workers.dev for MVP.
# [[routes]]
# pattern = "identity.<our-domain>/init-claim"
# custom_domain = true
